name: Refresh NSI snapshot

on:
  schedule:
    # Every Sunday at 20:00 UTC (Sunday evening market reset)
    - cron: "0 20 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build snapshot
        run: python3 scripts/snapshot.py

      - name: Commit if changed
        run: |
          git config user.name  "nsi-bot"
          git config user.email "nsi-bot@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: refresh NSI snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
